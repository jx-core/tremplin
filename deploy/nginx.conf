upstream tremplin_app {
  server app:3000;
}

# HTTP → HTTPS (and ACME challenge passthrough for cert renewal)
server {
  listen 80;
  listen [::]:80;
  server_name tremplin.stonebase.tech;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name tremplin.stonebase.tech;

  ssl_certificate     /etc/letsencrypt/live/tremplin.stonebase.tech/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tremplin.stonebase.tech/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

  client_max_body_size 12m;

  # Next build assets — already fingerprinted and immutable-cached by Next; just proxy.
  location /_next/static/ {
    proxy_pass http://tremplin_app;
  }
  # Public images/fonts/favicons — served straight from disk with a long browser cache.
  location /assets/ {
    alias /var/www/app-public/assets/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    try_files $uri =404;
  }

  location / {
    proxy_pass http://tremplin_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
  }
}
